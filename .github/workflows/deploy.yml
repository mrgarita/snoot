# 備忘録サイトと各バージョンのプレイ用ビルドを GitHub Pages へ公開する
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は最新のみ（古い実行はキャンセル）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得（全履歴・タグ込み）
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Node.js をセットアップ
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: サイトを組み立てる（備忘録＋各バージョンのビルド）
        run: |
          set -e
          VERSIONS="v0.1.0 v0.2.0 v0.3.0 v0.4.0 v0.5.0 v0.6.0 v0.7.0 v0.8.0 v0.8.1 v0.9.0 v0.9.1 v0.9.2 v0.9.3 v0.9.4 v0.9.5 v0.9.6 v0.9.7 v0.9.8 v0.9.9 v0.9.10 v0.9.11 v0.9.12 v0.9.13 v0.9.14 v0.9.15 v0.9.16 v0.9.17 v0.9.18 v0.9.19 v0.9.20 v0.9.21"
          LATEST="v0.9.21"

          # 備忘録サイトをルートに配置
          mkdir -p _site
          cp -r docs/site/. _site/
          touch _site/.nojekyll

          # 各バージョンを worktree で取り出してビルドし play/<tag>/ へ
          for v in $VERSIONS; do
            wt="$RUNNER_TEMP/build-$v"
            git worktree add "$wt" "$v"
            ( cd "$wt" && npm ci && npm run build )
            mkdir -p "_site/play/$v"
            cp -r "$wt/dist/." "_site/play/$v/"
            git worktree remove "$wt" --force
          done

          # 最新版を play/latest/ にも配置
          mkdir -p _site/play/latest
          cp -r "_site/play/$LATEST/." _site/play/latest/

      - name: Pages 設定（未設定なら自動で有効化）
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: アーティファクトをアップロード
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v5
