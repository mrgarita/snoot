<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1b2a4a">
  <!-- iOS でホーム画面に追加したとき全画面（スタンドアロン）で起動させる -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Snoot">
  <title>Snoot</title>
  <!-- favicon：キャラ「ネムリ」（紫・寝息の z）。Canvas 描画(drawSnoot type=4)と同じ意匠を SVG 化 -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='44' fill='%239b59b6' stroke='%23222' stroke-width='4'/%3E%3Cellipse cx='36' cy='32' rx='15' ry='9' fill='%23ffffff' fill-opacity='0.25' transform='rotate(-28 36 32)'/%3E%3Cline x1='28' y1='43' x2='42' y2='43' stroke='%23222' stroke-width='5' stroke-linecap='round'/%3E%3Cline x1='58' y1='43' x2='72' y2='43' stroke='%23222' stroke-width='5' stroke-linecap='round'/%3E%3Ccircle cx='50' cy='66' r='4' fill='%23222'/%3E%3Ctext x='70' y='30' font-family='sans-serif' font-size='22' font-weight='bold' fill='%23222'%3Ez%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
</head>
<body>
  <div id="app">
    <!-- ゲーム画面 -->
    <div id="game-screen" class="hidden">
      <div id="hud">
        <div id="hud-left">
          <span id="hud-difficulty"></span>
          <span id="hud-level"></span>
        </div>
        <div id="hud-danger">
          <span class="danger-label">DANGER</span>
          <div id="danger-bar"><div id="danger-fill"></div></div>
        </div>
        <div id="hud-right">
          <span id="hud-score">0</span>
          <button id="btn-quit" type="button">タイトルへ</button>
        </div>
      </div>
      <div id="canvas-wrap">
        <canvas id="game-canvas"></canvas>
      </div>
    </div>

    <!-- タイトル画面 -->
    <div id="title-screen">
      <h1 id="logo">Snoot</h1>
      <p id="tagline">ねらって、つなげて、おとせ！</p>
      <div id="level-buttons">
        <button class="level-btn" data-level="easy" type="button">Easy</button>
        <button class="level-btn" data-level="normal" type="button">Normal</button>
        <button class="level-btn" data-level="hard" type="button">Hard</button>
        <button id="btn-highscore" type="button">ハイスコア</button>
      </div>
      <p id="title-help">
        ねらいを定めてタップ／クリックで発射。同じ顔を 3 つつなげると消える。<br>
        撃つほど DANGER が増え、満タンで天井が降りてくる。全部消せばクリア！
      </p>
    </div>

    <!-- リザルトオーバーレイ（クリア／ゲームオーバー共用） -->
    <div id="result-overlay" class="hidden">
      <div id="result-box">
        <h2 id="result-title"></h2>
        <p id="result-score"></p>
        <p id="result-best"></p>
        <div id="result-buttons">
          <button id="btn-retry" type="button">もう一度</button>
          <button id="btn-next" type="button">次のレベルへ</button>
          <button id="btn-title" type="button">タイトルへ</button>
        </div>
      </div>
    </div>

    <!-- 名前入力オーバーレイ（新記録達成時） -->
    <div id="name-entry-overlay" class="hidden">
      <div id="name-entry-box">
        <h2>新記録！</h2>
        <p id="name-entry-msg"></p>
        <input id="name-input" type="text" maxlength="8" autocomplete="off">
        <button id="btn-name-ok" type="button">登録</button>
      </div>
    </div>

    <!-- ハイスコア一覧オーバーレイ（難易度別 Top5） -->
    <div id="highscore-overlay" class="hidden">
      <div id="highscore-box">
        <h2>ハイスコア</h2>
        <div id="highscore-tables"></div>
        <button id="btn-highscore-close" type="button">閉じる</button>
      </div>
    </div>

    <!-- バージョン表示（project.txt step4：プレイ中バージョンの明示） -->
    <div id="version-badge"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
